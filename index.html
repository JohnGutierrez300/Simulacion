<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>IoT Gasolina Dashboard</title>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .card {
            background: #1e293b;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        .alert {
            font-size: 24px;
            color: orange;
        }
    </style>
</head>

<body>

    <h1>⛽ Sistema IoT Gasolina (LIVE)</h1>

    <div class="card">
        <h2 id="estado">🔌 Conectando...</h2>
        <h3 id="valor">Valor: --</h3>
        <h2 id="alerta">🚨 Sin alertas</h2>
    </div>

    <canvas id="grafica"></canvas>

    <script>
        // ================= MQTT =================
        const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

        const topic = "iot/gasolina/vehiculo1";

        let datos = [];

        client.on("connect", function () {
            document.getElementById("estado").innerText = "🟢 Conectado MQTT";
            client.subscribe(topic);
        });

        client.on("message", function (topic, message) {

            let valor = parseFloat(message.toString());

            document.getElementById("valor").innerText = "Valor: " + valor;

            // alerta
            if (valor > 300) {
                document.getElementById("alerta").innerText = "🚨 FUGA DETECTADA";
                document.getElementById("alerta").style.color = "red";
            } else {
                document.getElementById("alerta").innerText = "🟢 Normal";
                document.getElementById("alerta").style.color = "green";
            }

            // datos gráfica
            datos.push(valor);
            if (datos.length > 20) datos.shift();

            actualizarGrafica();
        });

        // ================= GRÁFICA =================
        const ctx = document.getElementById("grafica").getContext("2d");

        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Gasolina',
                    data: [],
                    borderColor: 'red'
                }]
            }
        });

        function actualizarGrafica() {
            chart.data.labels = datos.map((_, i) => i);
            chart.data.datasets[0].data = datos;
            chart.update();
        }
    </script>

</body>

</html>
